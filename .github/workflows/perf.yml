name: Perf

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  perf:
    name: Performance regression suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run perf suite
        run: npm run test:perf
        env:
          # Shared runners are 1.4-1.6x slower than the machine the committed
          # baseline was recorded on and vary run to run, so the scheduled
          # gate runs with a doubled ceiling and only trips on gross
          # regressions. See docs/qa/perf-baseline.md.
          PERF_CEILING_SCALE: "2"
