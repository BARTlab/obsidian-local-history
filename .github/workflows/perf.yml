name: Perf

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

# Least-privilege default; jobs escalate only if they need more.
permissions:
  contents: read

jobs:
  perf:
    name: Performance regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run perf suite
        run: npm run test:perf
        env:
          # Shared runners are 1.4-1.6x slower than the machine the committed
          # baseline was recorded on and vary run to run, so the scheduled
          # gate runs with a doubled ceiling and only trips on gross
          # regressions. See docs/qa/perf-baseline.md.
          PERF_CEILING_SCALE: "2"
