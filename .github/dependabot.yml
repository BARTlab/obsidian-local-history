version: 2
updates:
  # Keep the SHA-pinned workflow actions fresh (complements the manual pins).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]

  # Build/dev deps: group minor+patch into one monthly PR, majors come solo.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    ignore:
      # Obsidian bundles CodeMirror and peers on exact versions, so these must
      # track the installed Obsidian, not float to npm latest (else `npm ci`
      # hits an ERESOLVE peer conflict). Bump them by hand alongside Obsidian.
      - dependency-name: "@codemirror/*"
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
