name: Release Obsidian plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

# Least-privilege default; the build job escalates for release + attestation.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required by attest-build-provenance: sign with the workflow's OIDC
      # identity and store the attestation on the repository.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Build plugin
        run: |
          npm ci
          npm run build

      # Publishes signed provenance for the release assets so users can verify
      # they were built from this repository (gh attestation verify).
      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Extract the section for this tag from CHANGELOG.md.
          # Section header format: ## [1.2.3] or ## [1.2.3] - YYYY-MM-DD
          notes="$(awk \
            "/^## \[${tag}\]/{found=1; next} found && /^## /{exit} found{print}" \
            CHANGELOG.md | sed '/^[[:space:]]*$/d')"

          if [ -n "$notes" ]; then
            gh release create "$tag" \
              --title="$tag" \
              --notes="$notes" \
              main.js manifest.json styles.css
          else
            gh release create "$tag" \
              --title="$tag" \
              --generate-notes \
              main.js manifest.json styles.css
          fi
