name: Release Obsidian plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Extract the section for this tag from CHANGELOG.md.
          # Section header format: ## [1.2.3] or ## [1.2.3] - YYYY-MM-DD
          notes="$(awk \
            "/^## \[${tag}\]/{found=1; next} found && /^## /{exit} found{print}" \
            CHANGELOG.md | sed '/^[[:space:]]*$/d')"

          if [ -n "$notes" ]; then
            gh release create "$tag" \
              --title="$tag" \
              --notes="$notes" \
              main.js manifest.json styles.css
          else
            gh release create "$tag" \
              --title="$tag" \
              --generate-notes \
              main.js manifest.json styles.css
          fi
